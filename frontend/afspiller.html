<!doctype html>
<html lang="da">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start side</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#faf9fe',
                        'surface-container-low': '#f4f3f8',
                        'surface-container': '#ebeaef',
                        'surface-container-high': '#e5e4ea',
                        'surface-container-highest': '#e0dce4',
                        primary: '#bb0023',
                        'primary-container': '#e80d30',
                        'on-surface': '#1a1b1f',
                        'on-surface-variant': '#44464f'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- import Inter font via Google  -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        /* Custom scrollbar for the queue */
        .scroll-queue::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-queue::-webkit-scrollbar-track {
            background: #ebeaef;
            border-radius: 3px;
        }

        .scroll-queue::-webkit-scrollbar-thumb {
            background: #171313;
            border-radius: 4px;
        }

        .scroll-queue::-webkit-scrollbar-thumb:hover {
            background: #191413;
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col pb-[200px] overflow-x-hidden">

    <header class="sticky top-0 z-10 px-8 py-8 md:px-16 bg-surface/80 backdrop-blur-xl">
        <input type="text" id="søgefelt"
            class="w-full max-w-[600px] bg-surface-container-low border-none rounded-2xl px-6 py-4 text-lg text-on-surface focus:outline-none focus:bg-surface-container transition-colors placeholder:text-on-surface-variant"
            placeholder="Søg efter sang, kunstner eller genre" />
    </header>

    <main class="flex flex-1 px-8 md:px-16 gap-12 lg:gap-24 pb-[200px] flex-col lg:flex-row">

        <section class="flex-[2] flex flex-col gap-12">
            <div>
                <h1 class="text-5xl font-bold tracking-tight leading-tight">Vælg din musik</h1>
                <h2 class="text-sm font-medium tracking-wide uppercase text-on-surface-variant mt-2">Alle dine
                    valgmuligheder af
                    sange </h2>
            </div>

            <div id="sangliste" class="flex flex-col gap-6">
                <!-- Tracks rendered here via script.js -->
            </div>
        </section>

        <aside
            class="flex-1 bg-surface-container-low rounded-[2rem] p-8 lg:p-12 flex flex-col gap-8 self-start sticky top-8">
            <div>
                <h2 class="text-4xl font-semibold tracking-tight leading-tight">Op Næste</h2>
                <h3 class="text-xs font-medium tracking-wide uppercase text-on-surface-variant mt-2">I Køen</h3>
            </div>

            <div id="køliste" class="flex flex-col gap-6 scroll-queue max-h-[50vh] overflow-y-auto pr-4">
                <!-- Queue rendered here via script.js -->
                <p class="text-base text-on-surface-variant" id="tomKøBesked">Din kø er tom.</p>
                <p class="text-base text-on-surface-variant" id="tomKøBesked">Stilhed før stormen.</p>
            </div>
        </aside>
    </main>

    <div
        class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-[1200px] bg-surface/80 backdrop-blur-xl rounded-[2rem] px-8 py-6 md:px-12 flex flex-col md:flex-row items-center justify-between shadow-[0_40px_60px_rgba(26,27,31,0.06)] z-[100] gap-4 md:gap-0">

        <div class="flex items-center gap-4 md:gap-8 w-full md:w-[30%]">
            <div class="w-16 h-16 md:w-20 md:h-20 rounded-[1.5rem] bg-gradient-to-br from-primary to-primary-container shadow-[0_16px_32px_rgba(187,0,35,0.2)]"
                id="afspillerBillede"></div>
            <div class="truncate">
                <h3 class="text-lg font-semibold truncate" id="afspillerTitel">Ingen sang spiller</h3>
                <p class="text-sm text-on-surface-variant truncate" id="afspillerKunstner">----</p>
            </div>
        </div>

        <div class="flex items-center gap-4 md:gap-8">
            <!-- Hvis vi skal have en forrige knap eller tilbage knap-->
            <!--<button
        class="bg-surface-container-highest/40 backdrop-blur-sm text-on-surface rounded-full px-4 py-2 font-medium text-sm hover:scale-105 transition-transform"
        id="forrigeKnap">Forrige</button>
      <button--->
            <button
                class="w-12 h-12 md:w-16 md:h-16 rounded-full bg-on-surface text-surface flex items-center justify-center text-xl md:text-2xl hover:scale-105 transition-transform"
                id="spilPauseKnap">►</button>
            <button
                class="bg-surface-container-highest/40 backdrop-blur-sm text-on-surface rounded-full px-4 py-2 font-medium text-sm hover:scale-105 transition-transform"
                id="næsteKnap">Næste</button>
        </div>

        <div class="flex items-center gap-4 w-full md:w-[30%]">
            <span class="text-xs font-medium tracking-wide uppercase text-on-surface-variant w-10 text-right"
                id="nuværendeTid">0:00</span>
            <div class="flex-1 h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
                <div class="h-full w-0 bg-gradient-to-r from-primary to-primary-container transition-all ease-linear"
                    id="progressFill"></div>
            </div>
            <span class="text-xs font-medium tracking-wide uppercase text-on-surface-variant w-10"
                id="totalTid">0:00</span>
        </div>
    </div>

    <script src="script.js"></script>
    <!-- Code injected by live-server -->
    <script>
        // <![CDATA[  <-- For SVG support
        if ('WebSocket' in window) {
            (function () {
                function refreshCSS() {
                    var sheets = [].slice.call(document.getElementsByTagName("link"));
                    var head = document.getElementsByTagName("head")[0];
                    for (var i = 0; i < sheets.length; ++i) {
                        var elem = sheets[i];
                        var parent = elem.parentElement || head;
                        parent.removeChild(elem);
                        var rel = elem.rel;
                        if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
                            var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
                            elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
                        }
                        parent.appendChild(elem);
                    }
                }
                var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';
                var address = protocol + window.location.host + window.location.pathname + '/ws';
                var socket = new WebSocket(address);
                socket.onmessage = function (msg) {
                    if (msg.data == 'reload') window.location.reload();
                    else if (msg.data == 'refreshcss') refreshCSS();
                };
                if (sessionStorage && !sessionStorage.getItem('IsThisFirstTime_Log_From_LiveServer')) {
                    console.log('Live reload enabled.');
                    sessionStorage.setItem('IsThisFirstTime_Log_From_LiveServer', true);
                }
            })();
        }
        else {
            console.error('Upgrade your browser. This Browser is NOT supported WebSocket for Live-Reloading.');
        }
        // ]]>
    </script>
</body>

</html>
