<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next-Track · Kom i gang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#bb0023' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col pb-40">
    <!-- Header indsættes her af components.js via DOMContentLoaded -->

    <!-- Indholdsområde: centreret lodret og vandret på siden -->
    <div class="flex-1 flex items-center justify-center px-8">

        <!-- TRIN 1: Navn og genre-valg -->
        <div id="trin-1" class="w-full max-w-lg">
            <div class="mb-8">
                <label class="text-sm font-medium text-zinc-400 mb-2 block">Dit navn</label>
                <input type="text" id="username-input" placeholder="fx casper" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3
                          text-white placeholder-zinc-500 outline-none
                          focus:border-red-500/50 transition-colors text-sm" />
            </div>
            <div class="mb-8">
                <label class="text-sm font-medium text-zinc-400 mb-3 block">Vælg op til 3 genrer</label>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button data-genre="pop" data-farve="bg-pink-500" onclick="toggleGenre(this)" class="genre-knap border border-white/10 bg-white/5 rounded-xl px-4 py-4
                               text-sm font-medium hover:border-white/20 transition-colors text-left text-white">
                        Pop
                    </button>
                    <button data-genre="rock" data-farve="bg-red-500" onclick="toggleGenre(this)" class="genre-knap border border-white/10 bg-white/5 rounded-xl px-4 py-4
                               text-sm font-medium hover:border-white/20 transition-colors text-left text-white">
                        Rock
                    </button>
                    <button data-genre="hip-hop" data-farve="bg-green-500" onclick="toggleGenre(this)" class="genre-knap border border-white/10 bg-white/5 rounded-xl px-4 py-4
                               text-sm font-medium hover:border-white/20 transition-colors text-left text-white">
                        Hip-Hop
                    </button>
                    <button data-genre="jazz" data-farve="bg-amber-500" onclick="toggleGenre(this)" class="genre-knap border border-white/10 bg-white/5 rounded-xl px-4 py-4
                               text-sm font-medium hover:border-white/20 transition-colors text-left text-white">
                        Jazz
                    </button>
                    <button data-genre="disco" data-farve="bg-purple-500" onclick="toggleGenre(this)"
                        class="genre-knap border border-white/10 bg-white/5 rounded-xl px-4 py-4
                               text-sm text-center font-medium hover:border-white/20 transition-colors text-left text-white col-span-2">
                        Disco
                    </button>
                </div>
                <button onclick="udfyldOnboarding()"
                    class="w-full bg-red-500 hover:bg-red-600 transition-colors rounded-xl py-3 text-sm font-semibold">
                    Næste →
                </button>
            </div>
        </div>

        <!-- TRIN 2: Pairwise voting -->
        <div id="trin-2" class="hidden w-full max-w-2xl">
            <div class="mb-8 text-center">
                <p class="text-zinc-500 text-sm mb-2">
                    Sammenligning <span id="runde-nummer">1</span> af <span id="total-runder">15</span>
                </p>
                <div class="h-1 bg-white/10 rounded-full w-full max-w-xs mx-auto">
                    <div id="voting-progress" class="h-full bg-red-500 rounded-full transition-all" style="width: 0%">
                    </div>
                </div>
            </div>
            <p class="text-center text-zinc-400 text-sm mb-6">Hvilken sang passer bedst lige nu?</p>
            <div class="flex gap-4 mb-6 pt-4">
                <!-- SANG A -->
                <div class="relative flex-1 min-w-0">
                    <div id="sang-a-floating-elo" class="hidden"></div>
                    <div id="sang-a-wildcard"
                        class="hidden absolute -top-3 right-2 bg-red-500 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wide shadow-md z-10">
                        Wildcard</div>
                    <div id="sang-a" onclick="stemPå(0)"
                        class="h-full rounded-2xl p-6 cursor-pointer border border-white/10 bg-white/5
                            hover:bg-white/10 hover:border-white/20 transition-colors text-center overflow-hidden flex flex-col justify-center">
                        <div id="sang-a-farve"
                            class="w-16 h-16 rounded-xl mx-auto mb-4 border-[3px] border-zinc-700 bg-transparent flex-shrink-0">
                        </div>
                        <p id="sang-a-titel" class="font-semibold text-sm truncate w-full" title="Titel">—</p>
                        <p id="sang-a-artist" class="text-xs text-zinc-400 mt-1 truncate w-full" title="Artist">—</p>
                        <p id="sang-a-elo-rating" class="text-xs text-zinc-400 mt-1 truncate w-full">—</p>
                    </div>
                </div>
                <div class="flex items-center justify-center text-zinc-600 font-bold text-lg flex-shrink-0 px-2">vs
                </div>
                <!-- SANG B -->
                <div class="relative flex-1 min-w-0">
                    <div id="sang-b-floating-elo" class="hidden"></div>
                    <div id="sang-b-wildcard"
                        class="hidden absolute -top-3 right-2 bg-red-500 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wide shadow-md z-10">
                        Wildcard</div>
                    <div id="sang-b" onclick="stemPå(1)"
                        class="h-full rounded-2xl p-6 cursor-pointer border border-white/10 bg-white/5
                            hover:bg-white/10 hover:border-white/20 transition-colors text-center overflow-hidden flex flex-col justify-center">
                        <div id="sang-b-farve"
                            class="w-16 h-16 rounded-xl mx-auto mb-4 border-[3px] border-zinc-700 bg-transparent flex-shrink-0">
                        </div>
                        <p id="sang-b-titel" class="font-semibold text-sm truncate w-full" title="Titel">—</p>
                        <p id="sang-b-artist" class="text-xs text-zinc-400 mt-1 truncate w-full" title="Artist">—</p>
                        <p id="sang-b-elo-rating" class="text-xs text-zinc-400 mt-1 truncate w-full">—</p>
                    </div>
                </div>
            </div>
            <div class="text-center">
                <button onclick="hopOver()" class="text-xs text-zinc-500 hover:text-zinc-300 transition-colors">
                    Kender ikke sangene — skip
                </button>
            </div>
        </div>

        <!-- TRIN 3: Resultater — alt indhold er inde i denne div så det kun vises til sidst -->
        <div id="trin-3" class="hidden w-full max-w-2xl">
            <h2 class="text-xl font-bold mt-4 mb-1">Dit mixtape er klar!</h2>
            <p class="text-zinc-400 text-sm mb-6">Her er din personlige liste</p>

            <!-- Sanglisten udfyldes af visResultater() -->
            <div id="resultat-liste" class="flex flex-col gap-2 mb-8"></div>

            <div class="mb-6">
                <label class="text-sm font-medium text-zinc-400 mb-2 block">Giv dit mixtape et navn</label>
                <input type="text" id="mixtape-name-input" placeholder="fx Weekend Vibes"
                    class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3
                          text-white placeholder-zinc-500 outline-none focus:border-red-500/50 transition-colors text-sm" />
            </div>

            <button onclick="gemMixtapeOgGåVidere()"
                class="w-full bg-red-500 hover:bg-red-600 transition-colors rounded-xl py-3 text-sm font-semibold">
                Gem Mixtape & Gå til Billboard →
            </button>
        </div>

    </div>

    <script src="components.js"></script>
    <script src="onboarding.js"></script>

</body>

</html>
