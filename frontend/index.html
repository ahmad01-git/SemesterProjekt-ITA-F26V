<html lang="da">

<head>

<body class="bg-zinc-100 text-zinc-900 font-sans p-8">

  <section class="glass rounded-3xl p-8 mb-8">
  <h2 class="text-3xl font-bold mb-3">Basale funktioner</h2>
  <p class="text-gray-600 mb-6">
    Jukeboxen skal kunne søge, afspille og sætte sange i kø.
  </p>

  <div class="grid md:grid-cols-4 gap-4">

  <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-lg transition">

    <p class="text-gray-600 text-sm">Afspil den valgte sang direkte.</p>

  <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-lg transition">

    <p class="text-gray-600 text-sm">Søg efter sang, kunstner eller genre.</p>
  </div>

  <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-lg transition">
    <h3 class="text-xl font-bold mb-2">📋 Kø</h3>
    <p class="text-gray-600 text-sm">Sæt sange i kø til næste afspilning.</p>
  </div>

  <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-lg transition">
    <h3 class="text-xl font-bold mb-2">📺 Visning</h3>
    <p class="text-gray-600 text-sm">Se nuværende sang, kunstner, genre og kø.</p>
  </div>

</div>
