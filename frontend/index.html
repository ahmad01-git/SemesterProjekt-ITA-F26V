<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next-Track</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-100 text-zinc-900 font-sans p-8">

  <!-- HEADER -->
  <header class="max-w-6xl mx-auto px-8 py-16 text-center">
    <h1 class="text-5xl font-black mb-6">Next-Track</h1>

    <p class="text-gray-600 text-xl mb-8">
      Søg efter musik, afspil sange og sæt dine favoritter i kø.
    </p>
  </header>

  <!-- JUKEBOX -->
  <section class="max-w-6xl mx-auto px-8 py-12">
    <h2 class="text-3xl font-bold mb-6">Jukebox</h2>

    <div class="grid lg:grid-cols-3 gap-6">

      <!-- VENSTRE -->
      <div class="lg:col-span-2 bg-white rounded-3xl p-6 shadow-md">
        <h3 class="text-2xl font-bold mb-4">Søg musik</h3>

        <input
          id="searchInput"
          type="text"
          placeholder="Søg efter sang, kunstner eller genre"
          class="w-full rounded-2xl border px-5 py-4 mb-6"
        >

        <div id="songList" class="space-y-4">
          <p>Indlæser sange...</p>
        </div>
      </div>

      <!-- HØJRE -->
      <div class="space-y-6">

        <!-- SPILLER -->
        <div class="bg-white rounded-3xl p-6 shadow-md">
          <h3 class="text-2xl font-bold mb-4">Spiller nu</h3>
          <p id="nowPlaying">Ingen sang valgt endnu</p>
        </div>

        <!-- KØ -->
        <div class="bg-white rounded-3xl p-6 shadow-md">
          <h3 class="text-2xl font-bold mb-4">Kø</h3>

          <button id="nextBtn"
            class="mb-4 bg-zinc-900 text-white px-4 py-2 rounded-xl">
            Næste ▶
          </button>

          <button id="clearQueueBtn"
           class="bg-red-500 text-white px-4 py-2 rounded-xl">
           Ryd kø
          </button>

          <div id="queueList">Køen er tom.</div>
        </div>

      </div>

    </div>
  </section>

  <!-- PLAYER BAR -->
<div class="fixed bottom-8 left-0 w-full px-8">

  <div class="max-w-6xl mx-auto bg-white border rounded-3xl p-4 shadow-lg flex items-center justify-between">

    <!-- Sang -->
    <div class="w-64">
      <p id="playerSong" class="font-bold text-xl">
        Ingen sang
      </p>

      <!-- Progress -->
      <div class="bg-gray-200 h-2 rounded-full mt-3">
        <div
          id="progressBar"
          class="bg-zinc-900 h-2 rounded-full w-0">
        </div>
      </div>
    </div>

    <!-- Knapper -->
    <div class="flex items-center gap-4">

      <button
        id="backBtn"
        class="bg-zinc-200 hover:bg-zinc-300 px-5 py-4 rounded-2xl text-xl">
        ⏮
      </button>

      <button
        id="playerBtn"
        class="bg-zinc-900 text-white hover:bg-zinc-700 px-8 py-4 rounded-2xl text-xl">
        ▶
      </button>

      <button
        id="forwardBtn"
        class="bg-zinc-200 hover:bg-zinc-300 px-5 py-4 rounded-2xl text-xl">
        ⏭
      </button>

    </div>

  </div>

</div>
  <script src="index.js"></script>
</body>
</html>
