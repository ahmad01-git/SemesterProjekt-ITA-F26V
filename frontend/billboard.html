<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next-Track - Billboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#bb0023' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col pb-40">

    <!-- Header og afspiller indsættes automatisk af components.js -->
    <main class="flex-1 px-8 py-8 max-w-5xl mx-auto w-full">

        <!-- BILLBOARD VIEW: Global Elo-ranking -->
        <div id="view-billboard" class="view">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-3xl font-bold">Billboard</h1>
                    <p class="text-sm text-zinc-500 mt-1">Top sange baseret på global Elo-rating</p>
                </div>
                <!-- Genre filter -->
                <select id="billboard-genre-filter"
                    class="bg-white/10 border border-white/10 rounded-lg px-3 py-1 text-sm text-white outline-none">
                    <option value="">Alle genrer</option>
                    <option value="pop">Pop</option>
                    <option value="rock">Rock</option>
                    <option value="hip-hop">Hip-Hop</option>
                    <option value="disco">Disco</option>
                    <option value="jazz">Jazz</option>
                </select>
            </div>

            <!-- Sangliste — udfyldes af hentBillboard() via sangKort() -->
            <div id="billboard-liste" class="flex flex-col gap-2"></div>
        </div>

        <!-- MIXTAPE VIEW: Brugerens personlige liste -->
        <div id="view-mixtape" class="view hidden">
            <div class="mb-6">
                <h1 id="mixtape-titel" class="text-3xl font-bold">Mit Mixtape</h1>
                <p class="text-sm text-zinc-500 mt-1">Din personlige samling</p>
            </div>

            <!-- Vises hvis brugeren ikke har et mixtape endnu -->
            <div id="ingen-mixtape" class="hidden text-center py-16">
                <p class="text-zinc-400 mb-2">Du har ikke lavet et mixtape endnu.</p>
                <p class="text-zinc-600 text-sm mb-6">Gå igennem onboarding for at bygge din første liste.</p>
                <button onclick="window.location.href='onboarding.html'"
                    class="bg-red-500 hover:bg-red-600 transition-colors rounded-xl px-6 py-3 text-sm font-semibold">
                    Start onboarding →
                </button>
            </div>

            <!-- Udfyldes af hentMixtape() -->
            <div id="mixtape-liste" class="flex flex-col gap-2"></div>

            <!-- Knap til at lave et nyt mixtape — vises altid i bunden af mixtape-viewet -->
            <div id="nyt-mixtape-sektion" class="hidden mt-8 pt-6 border-t border-white/10 text-center">
                <p class="text-zinc-500 text-sm mb-4">Vil du lave et nyt mixtape?</p>
                <button onclick="window.location.href='onboarding.html'"
                    class="bg-white/10 hover:bg-white/20 transition-colors rounded-xl px-6 py-3 text-sm font-semibold">
                    Start ny onboarding →
                </button>
            </div>
        </div>

    </main>

    <!-- components.js indsætter header og afspiller -->
    <script src="components.js"></script>

    <script>
        // ─── GLOBAL SANGELISTE ──────────────────────────
        // Gemmer de sange der vises, så afspilSang() kan finde den rigtige sang via index
        var sangeListe = []

        // ─── GENREFARVE ─────────────────────────────────
        // Returnerer en Tailwind baggrundsfarveklasse baseret på genre.
        // De 5 kendte genrer får faste farver.
        // Ukendte genrer får en konsistent farve baseret på genrenavnets bogstaver (hash).
        function hentGenreFarve(genre) {
            if (!genre) return 'bg-zinc-500'

            var kendte = {
                'rock': 'bg-red-500',
                'pop': 'bg-pink-500',
                'hip-hop': 'bg-green-500',
                'disco': 'bg-purple-500',
                'jazz': 'bg-amber-500'
            }

            var genreLower = genre.toLowerCase()
            if (kendte[genreLower]) return kendte[genreLower]

            // Vi lægger bogstavernes tal (charCode) sammen og bruger modulo
            // for at vælge en konsistent farve til ukendte genrer
            var ekstraFarver = ['bg-cyan-500', 'bg-orange-500', 'bg-teal-500', 'bg-indigo-500', 'bg-rose-400', 'bg-lime-500']
            var sum = 0
            for (var i = 0; i < genre.length; i++) {
                sum += genre.charCodeAt(i)
            }
            return ekstraFarver[sum % ekstraFarver.length]
        }

        // ─── VIEW NAVIGATION ────────────────────────────
        // Skifter mellem de to views: 'billboard' og 'mixtape'
        function skiftView(viewNavn) {
            var alleViews = document.querySelectorAll('.view')
            for (var i = 0; i < alleViews.length; i++) {
                alleViews[i].classList.add('hidden')
            }
            document.getElementById('view-' + viewNavn).classList.remove('hidden')

            // Hent brugerens mixtape når det viewet åbnes
            if (viewNavn === 'mixtape') {
                hentMixtape()
            }
        }

        // ─── SANGKORT ───────────────────────────────────
        // Bygger HTML for ét sangkort og returnerer det som en tekststreng.
        // onclick kalder afspilSang() med sangens index i sangeListe.
        function sangKort(sang, nummer) {
            var min = Math.floor(sang.duration_ms / 60000)
            var sek = String(Math.floor((sang.duration_ms % 60000) / 1000)).padStart(2, '0')

            var farve = hentGenreFarve(sang.genre)
            var index = nummer - 1  // index er 0-baseret, nummer er 1-baseret

            return '<div onclick="afspilSang(' + index + ')" class="flex items-center gap-6 px-4 py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-colors cursor-pointer">' +
                '<span class="text-white text-center w-6 font-medium">' + nummer + '</span>' +
                '<div class="w-12 h-12 rounded-xl ' + farve + ' flex-shrink-0 opacity-80"></div>' +
                '<div class="flex-1 min-w-0">' +
                    '<p class="text-sm font-medium text-white truncate">' + sang.title + '</p>' +
                    '<p class="text-zinc-400 text-xs mt-0.5">' + sang.artist + '</p>' +
                '</div>' +
                '<span class="text-xs font-mono ' + farve + ' text-white px-2 py-0.5 rounded-full">' + sang.elo_rating + '</span>' +
                '<span class="text-xs text-zinc-400">' + min + ':' + sek + '</span>' +
                '</div>'
        }

        // ─── AFSPIL SANG ────────────────────────────────
        // Kaldes når brugeren klikker på et sangkort.
        // Opdaterer afspiller-baren i bunden med den valgte sangs info.
        function afspilSang(index) {
            var sang = sangeListe[index]
            if (!sang) return

            var farve = hentGenreFarve(sang.genre)

            document.getElementById('afspillerTitel').textContent = sang.title
            document.getElementById('afspillerKunstner').textContent = sang.artist

            document.getElementById('afspillerBillede').className =
                'w-16 h-16 md:w-14 md:h-14 rounded-[1.5rem] ' + farve + ' border border-white/20 flex-shrink-0'

            var min = Math.floor(sang.duration_ms / 60000)
            var sek = String(Math.floor((sang.duration_ms % 60000) / 1000)).padStart(2, '0')
            document.getElementById('totalTid').textContent = min + ':' + sek
            document.getElementById('nuværendeTid').textContent = '0:00'
            document.getElementById('progressFill').style.width = '0%'

            document.getElementById('spilPauseKnap').textContent = '⏸'
        }

        // ─── BILLBOARD ──────────────────────────────────
        // Henter og viser den globale top 20 liste — kan filtreres på genre
        async function hentBillboard() {
            try {
                var genre = document.getElementById('billboard-genre-filter').value
                var url = genre ? '/api/billboard?genre=' + genre : '/api/billboard'

                var response = await fetch(url)
                var sange = await response.json()

                sangeListe = sange  // Gem så afspilSang() kan finde sangene

                var container = document.getElementById('billboard-liste')
                container.innerHTML = ''

                for (var i = 0; i < sange.length; i++) {
                    container.innerHTML += sangKort(sange[i], i + 1)
                }
            } catch (error) {
                console.error("Fejl ved hentning af billboard:", error)
            }
        }

        // ─── MIXTAPE ────────────────────────────────────
        // Henter brugerens mixtape og viser det.
        // Viser onboarding-link hvis brugeren ikke har et mixtape.
        async function hentMixtape() {
            var username = getCurrentUser()

            // Ingen bruger — vis "start onboarding" besked
            if (!username) {
                document.getElementById('ingen-mixtape').classList.remove('hidden')
                document.getElementById('mixtape-liste').innerHTML = ''
                document.getElementById('nyt-mixtape-sektion').classList.add('hidden')
                return
            }

            try {
                var res = await fetch('/api/mixtape?username=' + username)
                var sange = await res.json()

                // Tom liste — vis "start onboarding" besked
                if (!sange || sange.length === 0) {
                    document.getElementById('ingen-mixtape').classList.remove('hidden')
                    document.getElementById('mixtape-liste').innerHTML = ''
                    document.getElementById('nyt-mixtape-sektion').classList.add('hidden')
                    return
                }

                // Skjul "ingen mixtape" og vis sangene
                document.getElementById('ingen-mixtape').classList.add('hidden')
                document.getElementById('nyt-mixtape-sektion').classList.remove('hidden')

                // Opdater titel med mixtape-navn hvis det findes
                if (sange[0].mixtape_name) {
                    document.getElementById('mixtape-titel').textContent = sange[0].mixtape_name
                } else {
                    document.getElementById('mixtape-titel').textContent = 'Mit Mixtape'
                }

                sangeListe = sange  // Gem så afspilSang() kan finde sangene

                var container = document.getElementById('mixtape-liste')
                container.innerHTML = ''
                for (var i = 0; i < sange.length; i++) {
                    container.innerHTML += sangKort(sange[i], i + 1)
                }
            } catch (error) {
                console.error("Fejl ved hentning af mixtape:", error)
            }
        }

        // ─── START APPLIKATIONEN ────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            indsætHeader()
            indsætAfspiller()
            opdaterAvatar()

            // Hent og vis billboard som standard
            hentBillboard()

            // Tjek om URL har ?view=mixtape — bruges når man redirectes fra onboarding
            var params = new URLSearchParams(window.location.search)
            if (params.get('view') === 'mixtape') {
                skiftView('mixtape')
            }
        })

        // Opdater listen hvis brugeren skifter genre i dropdown-menuen
        document.getElementById('billboard-genre-filter').addEventListener('change', function () {
            hentBillboard()
        })

    </script>

</body>

</html>
