<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next-Track - Billboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#bb0023' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col pb-40">

    <!-- ═══ MAIN ═══ -->
    <!-- Header og afspiller indsættes automatisk af components.js -->
    <main class="flex-1 px-8 py-8 max-w-5xl mx-auto w-full">

        <!-- BILLBOARD VIEW -->
        <div id="view-billboard" class="view">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-3xl font-bold">Billboard</h1>
                    <p class="text-sm text-zinc-500 mt-1">Top sange baseret på global Elo-rating</p>
                </div>
                <!-- Genre filter -->
                <select id="billboard-genre-filter"
                    class="bg-white/10 border border-white/10 rounded-lg px-3 py-1 text-sm text-white outline-none">
                    <option value="">Alle genrer</option>
                    <option value="pop">Pop</option>
                    <option value="rock">Rock</option>
                    <option value="hip-hop">Hip-Hop</option>
                    <option value="disco">Disco</option>
                    <option value="jazz">Jazz</option>
                </select>
            </div>

            <!-- Sangliste — udfyldes af JavaScript via sangKort() -->
            <div id="billboard-liste" class="flex flex-col gap-2"></div>
        </div>

        <!-- MIXTAPE VIEW -->
        <div id="view-mixtape" class="view hidden">
            <div class="mb-6">
                <h1 class="text-3xl font-bold">Mit Mixtape</h1>
                <p class="text-sm text-zinc-500 mt-1">Din personlige samling</p>
            </div>

            <!-- Vises hvis brugeren ikke har et mixtape endnu -->
            <div id="ingen-mixtape" class="hidden text-center py-16">
                <p class="text-zinc-400 mb-2">Du har ikke lavet et mixtape endnu.</p>
                <p class="text-zinc-600 text-sm mb-6">Gå igennem onboarding for at bygge din første liste.</p>
                <button onclick="window.location.href='onboarding.html'"
                    class="bg-red-500 hover:bg-red-600 transition-colors rounded-xl px-6 py-3 text-sm font-semibold">
                    Start onboarding →
                </button>
            </div>

            <!-- Udfyldes af JavaScript -->
            <div id="mixtape-liste" class="flex flex-col gap-2"></div>
        </div>

        <!-- MERGE VIEW -->
        <div id="view-merge" class="view hidden">
            <div class="mb-6">
                <h1 class="text-3xl font-bold">Gruppe Mix</h1>
                <p class="text-sm text-zinc-500 mt-1">Slå to mixtapes sammen</p>
            </div>
            <!-- Input panel -->
            <div class="bg-white/5 border border-white/10 rounded-2xl p-6 max-w-md mb-8">
                <div class="flex flex-col gap-3">
                    <input type="text" id="merge-user-a" placeholder="Din bruger (fx casper)" class="bg-white/10 border border-white/10 rounded-lg px-4 py-2.5
                        text-sm text-white placeholder-zinc-500 outline-none
                        focus:border-red-500/50 transition-colors" />
                    <input type="text" id="merge-user-b" placeholder="Anden bruger (fx ahmed)" class="bg-white/10 border border-white/10 rounded-lg px-4 py-2.5
                        text-sm text-white placeholder-zinc-500 outline-none
                        focus:border-red-500/50 transition-colors" />
                    <button onclick="startMerge()" class="bg-red-500 hover:bg-red-600 transition-colors
                         rounded-lg py-2.5 text-sm font-semibold">
                        Merge mixtapes
                    </button>
                </div>
            </div>
            <div id="merge-liste" class="flex flex-col gap-2"></div>
        </div>

    </main>

    <!-- components.js indsætter header og afspiller -->
    <script src="components.js"></script>

    <script>
        // ─── GLOBAL SANGELISTE ──────────────────────────
        // Gemmer de sange der vises, så afspilSang() kan finde den rigtige sang
        let sangeListe = []

        // ─── GENREFARVE ─────────────────────────────────
        // Returnerer en Tailwind baggrundsfarveklasse baseret på genre.
        // De 5 kendte genrer får faste farver.
        // Ukendte genrer får en konsistent farve baseret på genrenavnets bogstaver.
        function hentGenreFarve(genre) {
            if (!genre) return 'bg-zinc-500'

            const kendte = {
                'rock': 'bg-red-500',
                'pop': 'bg-pink-500',
                'hip-hop': 'bg-green-500',
                'disco': 'bg-purple-500',
                'jazz': 'bg-amber-500',
            }

            const genreLower = genre.toLowerCase()
            if (kendte[genreLower]) return kendte[genreLower]

            // Vi lægger bogstavernes tal (charCode) sammen og bruger resten (modulo)
            // for at vælge en konsistent farve — tilføj evt. flere til listen
            const ekstraFarver = ['bg-cyan-500', 'bg-orange-500', 'bg-teal-500', 'bg-indigo-500', 'bg-rose-400', 'bg-lime-500']
            let sum = 0
            for (let i = 0; i < genre.length; i++) {
                sum += genre.charCodeAt(i)
            }
            return ekstraFarver[sum % ekstraFarver.length]
        }

        // ─── VIEW NAVIGATION ────────────────────────────
        function skiftView(viewNavn) {
            document.querySelectorAll('.view').forEach(function (view) {
                view.classList.add('hidden')
            })
            document.getElementById('view-' + viewNavn).classList.remove('hidden')

            // Når mixtape-viewet vises, hent brugerens mixtape
            if (viewNavn === 'mixtape') {
                hentMixtape()
            }
        }

        // ─── SANGKORT ───────────────────────────────────
        // Bygger HTML for ét sangkort og returnerer det som en tekststreng.
        // onclick kalder afspilSang() med sangens index i den globale sangeListe.
        function sangKort(sang, nummer) {
            const min = Math.floor(sang.duration_ms / 60000)
            const sek = String(
                Math.floor((sang.duration_ms % 60000) / 1000)
            ).padStart(2, '0')

            const farve = hentGenreFarve(sang.genre)
            const index = nummer - 1  // index 0-baseret, nummer 1-baseret

            return `
        <div onclick="afspilSang(${index})" class="flex items-center gap-6 px-4 py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-colors cursor-pointer">
            <span class="text-white text-center w-6 font-medium">
                ${nummer}
            </span>
            <div class="w-12 h-12 rounded-xl ${farve} flex-shrink-0 opacity-80"></div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-white truncate">
                    ${sang.title}
                </p>
                <p class="text-zinc-400 text-xs mt-0.5">
                    ${sang.artist}
                </p>
            </div>
            <span class="text-xs font-mono ${farve} text-white px-2 py-0.5 rounded-full">
                ${sang.elo_rating}
            </span>
            <span class="text-xs text-zinc-400">
                ${min}:${sek}
            </span>
        </div>
    `
        }

        // ─── AFSPIL SANG ────────────────────────────────
        // Kaldes når brugeren klikker på et sangkort.
        // Opdaterer afspiller-baren i bunden med den valgte sangs info.
        function afspilSang(index) {
            const sang = sangeListe[index]
            if (!sang) return

            const farve = hentGenreFarve(sang.genre)

            // Opdater titel og kunstner i afspilleren
            document.getElementById('afspillerTitel').textContent = sang.title
            document.getElementById('afspillerKunstner').textContent = sang.artist

            // Opdater cover-billedets farve i afspilleren (matcher sangens genre)
            document.getElementById('afspillerBillede').className =
                'w-16 h-16 md:w-14 md:h-14 rounded-[1.5rem] ' + farve + ' border border-white/20 flex-shrink-0'

            // Opdater varighed
            const min = Math.floor(sang.duration_ms / 60000)
            const sek = String(Math.floor((sang.duration_ms % 60000) / 1000)).padStart(2, '0')
            document.getElementById('totalTid').textContent = min + ':' + sek
            document.getElementById('nuværendeTid').textContent = '0:00'
            document.getElementById('progressFill').style.width = '0%'

            // Skift knap til pause-ikon
            document.getElementById('spilPauseKnap').textContent = '⏸'
        }

        // ─── BILLBOARD ──────────────────────────────────
        async function hentBillboard() {
            try {
                const genre = document.getElementById('billboard-genre-filter').value
                const url = genre ? '/api/billboard?genre=' + genre : '/api/billboard'

                const response = await fetch(url)
                const sange = await response.json()

                sangeListe = sange  // Gem så afspilSang() kan finde sangene

                console.log("Billboard data:", sange)

                const container = document.getElementById('billboard-liste')
                container.innerHTML = ''

                for (let i = 0; i < sange.length; i++) {
                    container.innerHTML += sangKort(sange[i], i + 1)
                }
            } catch (error) {
                console.error("Fejl ved hentning af billboard:", error)
            }
        }

        // ─── MIXTAPE ────────────────────────────────────
        // Henter brugerens mixtape og viser det.
        // Hvis brugeren ikke har et mixtape, vises en besked med link til onboarding.
        async function hentMixtape() {
            const username = getCurrentUser()

            // Hvis vi ikke kender brugeren, vis "ingen mixtape" med link til onboarding
            if (!username) {
                document.getElementById('ingen-mixtape').classList.remove('hidden')
                document.getElementById('mixtape-liste').innerHTML = ''
                return
            }

            try {
                const res = await fetch('/api/mixtape?username=' + username)
                const sange = await res.json()

                console.log("Mixtape data:", sange)

                // Hvis listen er tom, vis "ingen mixtape" med link til onboarding
                if (!sange || sange.length === 0) {
                    document.getElementById('ingen-mixtape').classList.remove('hidden')
                    document.getElementById('mixtape-liste').innerHTML = ''
                    return
                }

                // Skjul "ingen mixtape" og vis sangene
                document.getElementById('ingen-mixtape').classList.add('hidden')

                sangeListe = sange  // Gem så afspilSang() kan finde sangene

                const container = document.getElementById('mixtape-liste')
                container.innerHTML = ''
                for (let i = 0; i < sange.length; i++) {
                    container.innerHTML += sangKort(sange[i], i + 1)
                }
            } catch (error) {
                console.error("Fejl ved hentning af mixtape:", error)
            }
        }

        // ─── MERGE ──────────────────────────────────────
        async function startMerge() {
            const userA = document.getElementById('merge-user-a').value
            const userB = document.getElementById('merge-user-b').value
            if (!userA || !userB) return

            const res = await fetch('/api/merge?userA=' + userA + '&userB=' + userB)
            const sange = await res.json()

            sangeListe = sange  // Gem så afspilSang() kan finde sangene

            const container = document.getElementById('merge-liste')
            container.innerHTML = ''
            sange.forEach(function (sang, index) {
                container.innerHTML += sangKort(sang, index + 1)
            })
        }

        // ─── START APPLIKATIONEN ────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            // Indsæt header og afspiller fra components.js
            indsætHeader()
            indsætAfspiller()
            opdaterAvatar()

            // Hent og vis billboard
            hentBillboard()
        })

        // Opdater listen hvis brugeren skifter genre i dropdown-menuen
        document.getElementById('billboard-genre-filter').addEventListener('change', function () {
            hentBillboard()
        })

    </script>

</body>

</html>
